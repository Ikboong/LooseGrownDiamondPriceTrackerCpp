<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loose Grown Diamond Price Tracker</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --panel: #1a1f25;
      --panel-border: #2a3037;
      --text: #c9d1d9;
      --muted: #7d8b9a;
      --grid: #242a30;
      --blue: #3f83d8;
      --button: #252b32;
      --button-border: #303842;
    }
    :root.light {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-border: #d7dde4;
      --text: #1d2630;
      --muted: #667382;
      --grid: #eef1f4;
      --blue: #2f78d1;
      --button: #eef2f6;
      --button-border: #d7dde4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    main {
      width: min(100vw, 1600px);
      margin: 0 auto;
      padding: 20px 48px 34px;
    }
    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 24px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .subtitle, .source {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.35;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }
    .source { white-space: nowrap; }
    button {
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: var(--button);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      height: 45px;
      padding: 0 22px;
    }
    button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #07111d;
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .chart-shell {
      position: relative;
      height: min(78vh, 850px);
      min-height: 520px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    #chart {
      width: 100%;
      height: 100%;
    }
    .tv-mark {
      position: absolute;
      left: 14px;
      bottom: 44px;
      color: #b9c1cc;
      font-size: 29px;
      font-weight: 800;
      letter-spacing: -2px;
      opacity: 0.88;
      pointer-events: none;
    }
    .empty {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 28px;
      background: var(--panel);
      color: var(--muted);
    }
    @media (max-width: 760px) {
      main { padding: 18px 14px 28px; }
      header { grid-template-columns: 1fr; gap: 12px; }
      h1 { font-size: 25px; }
      .subtitle, .source { font-size: 14px; }
      .actions { justify-content: flex-start; flex-wrap: wrap; gap: 10px; }
      .source { width: 100%; white-space: normal; }
      .chart-shell { height: 68vh; min-height: 430px; }
      button { height: 42px; padding: 0 14px; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Loose Grown Diamond Charts</h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="actions">
      <div class="source">Source: data/loosegrown_price_history.csv</div>
      <button id="themeButton" type="button">Light</button>
    </div>
  </header>
  <div class="tabs" id="tabs" hidden>
    <button class="active" id="dailyButton" type="button">Daily line</button>
    <button id="weeklyButton" type="button">Weekly candle</button>
  </div>
  <div id="content"></div>
</main>
<script>
const dailyData = [{"time":"2026-05-17","timestamp":"2026-05-17 22:52:10","value":3920,"original":7467,"sku":"788614945","carat":"5.01","totalMatches":"60"},{"time":"2026-05-18","timestamp":"2026-05-18 09:01:31","value":3920,"original":7467,"sku":"788614945","carat":"5.01","totalMatches":"60"},{"time":"2026-05-19","timestamp":"2026-05-19 09:02:16","value":4535,"original":8639,"sku":"778616255","carat":"5.00","totalMatches":"56"},{"time":"2026-05-20","timestamp":"2026-05-20 09:00:57","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"59"},{"time":"2026-05-21","timestamp":"2026-05-21 09:01:14","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"59"},{"time":"2026-05-22","timestamp":"2026-05-22 09:01:16","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"60"},{"time":"2026-05-23","timestamp":"2026-05-23 09:00:40","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"60"},{"time":"2026-05-24","timestamp":"2026-05-24 09:00:49","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"59"},{"time":"2026-05-25","timestamp":"2026-05-25 09:01:24","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"60"},{"time":"2026-05-26","timestamp":"2026-05-26 09:01:23","value":3805,"original":7248,"sku":"798604291","carat":"5.03","totalMatches":"57"}];
let activeView = 'daily';
let currentChart = null;
let isLight = false;

function formatPrice(price) {
  return '$' + Math.round(price).toLocaleString('en-US');
}

function weekStartIso(isoDate) {
  const date = new Date(isoDate + 'T00:00:00Z');
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() - day + 1);
  return date.toISOString().slice(0, 10);
}

function toWeeklyCandles(rows) {
  const grouped = new Map();
  for (const row of rows) {
    const week = weekStartIso(row.time);
    if (!grouped.has(week)) {
      grouped.set(week, { time: week, open: row.value, high: row.value, low: row.value, close: row.value });
    } else {
      const candle = grouped.get(week);
      candle.high = Math.max(candle.high, row.value);
      candle.low = Math.min(candle.low, row.value);
      candle.close = row.value;
    }
  }
  return Array.from(grouped.values());
}

function chartOptions() {
  const styles = getComputedStyle(document.documentElement);
  return {
    autoSize: true,
    layout: {
      background: { color: styles.getPropertyValue('--panel').trim() },
      textColor: styles.getPropertyValue('--text').trim(),
    },
    grid: {
      vertLines: { color: styles.getPropertyValue('--grid').trim() },
      horzLines: { color: styles.getPropertyValue('--grid').trim() },
    },
    rightPriceScale: { borderColor: styles.getPropertyValue('--panel-border').trim() },
    timeScale: { borderColor: styles.getPropertyValue('--panel-border').trim(), timeVisible: false },
    localization: { priceFormatter: formatPrice },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  };
}

function setActiveButton() {
  document.getElementById('dailyButton').classList.toggle('active', activeView === 'daily');
  document.getElementById('weeklyButton').classList.toggle('active', activeView === 'weekly');
}

function renderChart() {
  const chartElement = document.getElementById('chart');
  chartElement.innerHTML = '';
  if (currentChart && currentChart.remove) currentChart.remove();
  currentChart = LightweightCharts.createChart(chartElement, chartOptions());

  if (activeView === 'daily') {
    const line = currentChart.addLineSeries({
      color: getComputedStyle(document.documentElement).getPropertyValue('--blue').trim(),
      lineWidth: 2,
      priceLineVisible: true,
    });
    line.setData(dailyData.map(row => ({ time: row.time, value: row.value })));
  } else {
    const candles = currentChart.addCandlestickSeries({
      upColor: '#2f78d1',
      downColor: '#d44d4d',
      borderUpColor: '#2f78d1',
      borderDownColor: '#d44d4d',
      wickUpColor: '#2f78d1',
      wickDownColor: '#d44d4d',
    });
    candles.setData(toWeeklyCandles(dailyData));
  }
  currentChart.timeScale().fitContent();
  setActiveButton();
}

const content = document.getElementById('content');
if (!dailyData.length) {
  content.innerHTML = '<div class="empty">No successful data yet.</div>';
} else {
  const last = dailyData[dailyData.length - 1];
  document.getElementById('subtitle').textContent =
    `Latest: ${last.timestamp} KST / ${formatPrice(last.value)} / ${dailyData.length} daily points`;
  document.getElementById('tabs').hidden = false;
  content.innerHTML = `
    <section class="chart-shell">
      <div id="chart"></div>
      <div class="tv-mark">TV</div>
    </section>`;

  document.getElementById('dailyButton').addEventListener('click', () => {
    activeView = 'daily';
    renderChart();
  });
  document.getElementById('weeklyButton').addEventListener('click', () => {
    activeView = 'weekly';
    renderChart();
  });
  document.getElementById('themeButton').addEventListener('click', () => {
    isLight = !isLight;
    document.documentElement.classList.toggle('light', isLight);
    document.getElementById('themeButton').textContent = isLight ? 'Dark' : 'Light';
    renderChart();
  });
  renderChart();
}
</script>
</body>
</html>
