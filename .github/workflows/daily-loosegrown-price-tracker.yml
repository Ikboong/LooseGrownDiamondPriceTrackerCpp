name: Daily Loose Grown Diamond Price Tracker

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-loosegrown-price-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Measure Loose Grown Diamond lowest price
        shell: pwsh
        run: ./run.ps1

      - name: Commit updated data and chart
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          New-Item -ItemType Directory -Force docs | Out-Null
          Copy-Item data/loosegrown_tradingview_chart.html docs/loosegrown.html -Force

          git add data/loosegrown_price_history.csv data/loosegrown_tradingview_chart.html docs/loosegrown.html

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes to commit."
            exit 0
          }
          if ($LASTEXITCODE -ne 1) {
            throw "git diff failed with exit code $LASTEXITCODE"
          }

          git commit -m "Update loose grown diamond price [skip ci]"
          git push

  deploy-pages:
    needs: update
    if: ${{ always() && needs.update.result != 'cancelled' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest data
        run: git pull --ff-only origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
